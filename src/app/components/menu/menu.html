<div class="menu-page">
  <div class="container">

    <!-- Header -->
    <div class="mb-4 fade-in-up">
      <h1 class="menu-page-title">☕ Nuestro Menú</h1>
      <p class="menu-page-subtitle">Elige tus productos favoritos y añádelos al carrito</p>
    </div>

    <!-- Loading -->
    <div *ngIf="cargando" class="menu-loading">
      <div class="warm-spinner"></div>
      <span>Cargando productos...</span>
    </div>

    <!-- Grid de productos -->
    <div class="row g-4" *ngIf="!cargando">
      <div class="col-sm-6 col-lg-4 fade-in-up" *ngFor="let producto of productos">
        <div class="product-card">
          <!-- CORREGIDO: Ahora usa ruta relativa para que cargue en Render y en Localhouse -->
          <img [src]="'/uploads/' + producto.imagen" class="product-card-img" [alt]="producto.nombre">

          <div class="product-card-body">
            <h5 class="product-name">{{ producto.nombre }}</h5>
            <p class="product-desc">{{ producto.descripcion }}</p>
            <div class="product-price">S/. {{ producto.precio }}</div>
            <p class="product-stock">Stock: <span>{{ producto.stock }}</span></p>

            <!-- Control de cantidad -->
            <div class="qty-control">
              <button class="qty-btn" (click)="disminuir(producto)">−</button>
              <span class="qty-value">{{ producto.cantidad }}</span>
              <button class="qty-btn" (click)="aumentar(producto)">+</button>
            </div>

            <button class="btn-add-cart" (click)="agregar(producto)">
              🛒 Agregar al carrito
            </button>
          </div>
        </div>
      </div>
    </div>
    <footer style="font-size: 10px; text-align: center; color: gray;">COPYRIGHT Sushi® 2026</footer>
  </div>
</div>
