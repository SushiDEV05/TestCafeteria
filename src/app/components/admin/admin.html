<div class="admin-page">
  <div class="container">

    <!-- Header -->
    <div class="mb-4 fade-in-up">
      <h1 class="admin-page-title">🛠 Panel Administrador</h1>
    </div>

    <!-- Formulario de Producto -->
    <div class="admin-form-card fade-in-up">
      <div class="admin-form-header">
        {{ editando ? '✏️ Editar Producto' : '➕ Agregar Producto' }}
      </div>
      <div class="admin-form-body">
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" placeholder="Ej: Café Latte" [(ngModel)]="nuevoProducto.nombre">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Descripción</label>
            <input type="text" class="form-control" placeholder="Breve descripción"
              [(ngModel)]="nuevoProducto.descripcion">
          </div>
          <div class="col-sm-4">
            <label class="form-label">Precio (S/.)</label>
            <input type="number" class="form-control" placeholder="0.00" [(ngModel)]="nuevoProducto.precio">
          </div>
          <div class="col-sm-4">
            <label class="form-label">Stock</label>
            <input type="number" class="form-control" placeholder="0" [(ngModel)]="nuevoProducto.stock">
          </div>
          <div class="col-sm-4">
            <label class="form-label">Imagen</label>
            <input type="file" class="form-control" accept=".jpg,.jpeg,.png" (change)="seleccionarImagen($event)">
          </div>
        </div>
        <div class="mt-4 d-flex gap-2">
          <button class="btn-admin-save" (click)="agregarProducto()">
            {{ editando ? '✓ Actualizar' : '+ Agregar' }}
          </button>
          <button *ngIf="editando" class="btn-admin-cancel" (click)="cancelarEdicion()">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- Tabla de Productos -->
    <div class="admin-table-card fade-in-up">
      <div class="admin-form-header">
        📦 Productos Registrados
      </div>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let producto of productos">
              <td><span class="admin-id">#{{ producto.id_producto }}</span></td>
              <td style="font-weight: 600;">{{ producto.nombre }}</td>
              <td style="color: #9C7B5E; font-size: 0.87rem;">{{ producto.descripcion }}</td>
              <td><span class="admin-price">S/. {{ producto.precio }}</span></td>
              <td><span class="admin-stock">{{ producto.stock }}</span></td>
              <td>
                <button class="btn-edit-sm" (click)="editarProducto(producto)">✏️ Editar</button>
                <button class="btn-delete-sm" (click)="eliminarProducto(producto.id_producto)">🗑 Eliminar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <footer style="font-size: 10px; text-align: center; color: gray;">COPYRIGHT Sushi®</footer>
  </div>
</div>
