<nav class="warm-navbar navbar navbar-expand-lg" *ngIf="isLoggedIn">
  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand-warm" routerLink="/inicio">
      <span class="brand-emoji">☕</span>
      Cafetería Dinastia
    </a>

    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center gap-1">

        <!-- Badge de rol -->
        <li class="nav-item me-2">
          <span class="role-badge">
            {{ userRole }}
          </span>
        </li>


        <!-- Links de navegación -->
        <li class="nav-item">
          <a class="nav-link-item" routerLink="/inicio"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{exact: true}">
            Inicio
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link-item" routerLink="/menu" routerLinkActive="active-link">
            Menú
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link-item" routerLink="/carrito" routerLinkActive="active-link">
            🛒 Carrito
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link-item" routerLink="/ventas" routerLinkActive="active-link">
            🧾 Ventas
          </a>
        </li>

        <li class="nav-item" *ngIf="activeRole === 'administrador' || activeRole === 'super'">
          <a class="nav-link-item" routerLink="/admin" routerLinkActive="active-link">
            Admin
          </a>
        </li>

        <li class="nav-item" *ngIf="activeRole === 'administrador' || activeRole === 'super'">
          <a class="nav-link-item" routerLink="/clientes" routerLinkActive="active-link">
            👥 Clientes
          </a>
        </li>

        <li class="nav-item" *ngIf="activeRole === 'administrador' || activeRole === 'super'">
          <a class="nav-link-item" routerLink="/gestion-usuarios" routerLinkActive="active-link">
            👥 Gestión
          </a>
        </li>

        <!-- Cerrar Sesión -->
        <li class="nav-item ms-1">
          <button class="btn-logout" (click)="cerrarSesion()">
            ⎋ Cerrar Sesión
          </button>
        </li>

      </ul>
    </div>

  </div>
</nav>
