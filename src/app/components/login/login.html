<div class="login-wrapper">
  <div class="container" style="max-width: 460px; position: relative; z-index: 1;">
    <div class="login-card card border-0">

      <!-- Header -->
      <div class="card-header text-center border-0 bg-transparent pt-4 pb-2">
        <div class="brand-icon mb-2">☕</div>
        <h3 class="brand-title mb-1">DinastiaOrder</h3>
        <p class="brand-subtitle mb-0">Selecciona tu rol e inicia sesión</p>
      </div>

      <hr class="login-divider mx-4 mt-3">

      <div class="card-body px-4 pb-4 pt-3">

        <!-- Selector de Rol -->
        <div class="mb-4">
          <p class="role-selector-label text-center mb-2">Rol de acceso</p>
          <div class="role-btn-group">
            <button type="button" class="role-btn" [class.active]="rolSeleccionado === 'cliente'"
              (click)="seleccionarRol('cliente')">
              🛍️ Cliente
            </button>
            <button type="button" class="role-btn" [class.active]="rolSeleccionado === 'administrador'"
              (click)="seleccionarRol('administrador')">
              🛠 Admin
            </button>
            <button type="button" class="role-btn" [class.active]="rolSeleccionado === 'empleado'"
              (click)="seleccionarRol('empleado')">
              👤 Empleado
            </button>
            <button type="button" class="role-btn" [class.active]="rolSeleccionado === 'super'"
              (click)="seleccionarRol('super')">
              ⭐ Super
            </button>
          </div>
        </div>

        <!-- Formulario -->
        <form (ngSubmit)="iniciarSesion()">

          <div class="form-floating mb-3">
            <input type="email" id="usuarioInput" class="form-control" placeholder="name@example.com"
              [(ngModel)]="usuario" name="usuario" required>
            <label for="usuarioInput">✉️ Correo Electrónico</label>
          </div>

          <div class="form-floating mb-3">
            <input type="password" id="passwordInput" class="form-control" placeholder="Contraseña"
              [(ngModel)]="password" name="password" required>
            <label for="passwordInput">🔑 Contraseña</label>
          </div>

          <!-- Credenciales de ayuda -->
          <div class="hint-alert mb-4 text-center">
            🥑
            <span *ngIf="rolSeleccionado === 'administrador'">
            </span>
            <span *ngIf="rolSeleccionado === 'empleado'">
            </span>
            <span *ngIf="rolSeleccionado === 'super'">
            </span>
            <span *ngIf="rolSeleccionado === 'cliente'">
              Ingresa con tu cuenta de cliente
            </span>
          </div>
          <button type="submit" id="loginSubmitBtn" class="btn btn-login w-100">
            Iniciar Sesión →
          </button>

          <!-- Link de Registro -->
          <div class="text-center mt-3">
            <p class="registro-text">¿No tienes cuenta? <a routerLink="/registro" class="registro-link">Regístrate aquí</a></p>
          </div>

          <footer style="font-size: 10px; text-align: center; color: gray; margin-top: 0.5rem;">COPYRIGHT Sushi®</footer>
        </form>
      </div>
    </div>
  </div>
</div>
