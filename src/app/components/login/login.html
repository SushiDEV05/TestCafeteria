<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card shadow p-4">

        <h2 class="text-center mb-4">
          Login Administrador
        </h2>

        <div class="mb-3">

          <label class="form-label">
            Usuario
          </label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="usuario"
          >

        </div>

        <div class="mb-3">

          <label class="form-label">
            Contraseña
          </label>

          <input
            type="password"
            class="form-control"
            [(ngModel)]="password"
          >

        </div>

        <button
          class="btn btn-dark w-100"
          (click)="iniciarSesion()"
        >
          Iniciar Sesión
        </button>

      </div>

    </div>

  </div>

</div>
